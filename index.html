<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hololive ASMR Shelf MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">ASMR archive MVP</p>
          <h1>Hololive ASMR Shelf</h1>
        </div>
        <button class="icon-button" id="sleepModeButton" type="button" aria-label="睡眠モード">
          <span>☾</span>
        </button>
      </header>

      <aside class="notice" aria-label="サンプルデータについて">
        このMVPはUIと連続再生機能の検証用です。配信データはサンプルなので、公開時は
        <code>sample-data.js</code> を公式配信URLの実データに差し替えてください。
      </aside>

      <main class="layout">
        <section class="panel player-panel" aria-label="プレイヤー">
          <div class="player-frame" id="player"></div>
          <div class="now-playing">
            <p class="eyebrow">Now playing</p>
            <h2 id="nowTitle">今夜の1本を選んでください</h2>
            <p id="nowMeta">カードからキューに追加して再生できます。</p>
            <p class="player-status" id="playerStatus">プレイヤーを準備しています。</p>
          </div>

          <div class="controls">
            <button class="primary" id="playQueueButton" type="button">キューを再生</button>
            <button id="prevButton" type="button">前へ</button>
            <button id="nextButton" type="button">次へ</button>
            <label class="toggle">
              <input id="autoNextToggle" type="checkbox" checked />
              <span>連続再生</span>
            </label>
            <label class="toggle">
              <input id="shuffleToggle" type="checkbox" />
              <span>シャッフル</span>
            </label>
            <label class="toggle">
              <input id="infiniteToggle" type="checkbox" checked />
              <span>自動補充</span>
            </label>
          </div>

          <div class="sleep-tools">
            <label>
              スリープタイマー
              <select id="timerSelect">
                <option value="0">停止しない</option>
                <option value="30">30分</option>
                <option value="60">60分</option>
                <option value="90">90分</option>
                <option value="video">この動画で停止</option>
              </select>
            </label>
            <label>
              音量
              <input id="volumeRange" type="range" min="0" max="100" value="35" />
            </label>
            <p id="timerStatus">タイマー未設定</p>
          </div>

          <div class="queue">
            <div class="section-title">
              <h3>今夜のキュー</h3>
              <button id="clearQueueButton" type="button">クリア</button>
            </div>
            <ol id="queueList"></ol>
          </div>
        </section>

        <section class="content">
          <div class="panel filters">
            <form class="add-video" id="addVideoForm">
              <div class="section-title compact">
                <div>
                  <h2>公式URLを追加</h2>
                  <p>YouTubeの公式配信URLを貼ると、このブラウザに保存されます。</p>
                </div>
              </div>
              <div class="search-row">
                <label>
                  YouTube URL
                  <input id="videoUrlInput" type="url" placeholder="https://www.youtube.com/watch?v=..." />
                </label>
                <label>
                  タイトル
                  <input id="videoTitleInput" type="text" placeholder="配信タイトル" />
                </label>
                <label>
                  メンバー
                  <input id="videoMemberInput" type="text" placeholder="メンバー名" />
                </label>
                <label>
                  状態
                  <select id="videoStatusInput">
                    <option value="active">現役</option>
                    <option value="graduated">卒業生</option>
                  </select>
                </label>
              </div>
              <button class="primary" type="submit">追加</button>
              <p class="form-status" id="addVideoStatus"></p>
            </form>

            <div class="search-row">
              <label>
                検索
                <input id="searchInput" type="search" placeholder="メンバー、タイトル、タグ" />
              </label>
              <label>
                状態
                <select id="statusFilter">
                  <option value="all">全員</option>
                  <option value="active">現役</option>
                  <option value="graduated">卒業生</option>
                </select>
              </label>
              <label>
                言語
                <select id="languageFilter">
                  <option value="all">すべて</option>
                  <option value="ja">日本語</option>
                  <option value="en">英語</option>
                  <option value="id">インドネシア語</option>
                </select>
              </label>
            </div>

            <div class="mood-row" id="moodButtons" aria-label="気分フィルター"></div>
          </div>

          <div class="section-title">
            <div>
              <h2>ASMR配信</h2>
              <p id="resultCount">0件</p>
            </div>
            <button id="buildNightQueueButton" type="button">表示中から今夜のキュー作成</button>
          </div>

          <div class="cards" id="videoCards"></div>
        </section>
      </main>
    </div>

    <template id="cardTemplate">
      <article class="video-card">
        <div class="thumb">
          <img alt="" />
          <button class="favorite" type="button" aria-label="お気に入り">☆</button>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span class="status"></span>
            <span class="duration"></span>
          </div>
          <h3></h3>
          <p class="member"></p>
          <div class="tags"></div>
          <div class="card-actions">
            <button class="add primary" type="button">キューに追加</button>
            <button class="play" type="button">今すぐ再生</button>
            <a target="_blank" rel="noreferrer">YouTube</a>
          </div>
        </div>
      </article>
    </template>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="./sample-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
